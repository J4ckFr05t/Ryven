services:
  ryven:
    image: ryven:latest
    build: .
    ports:
      - "8000:8000"
    # Provide values from Portainer Stack > Environment variables.
    environment:
      APP_MODE: ${APP_MODE:-prod}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      ALLOWED_DIRECTORIES: ${ALLOWED_DIRECTORIES:-}
      AUTH_SIGNING_KEY: ${AUTH_SIGNING_KEY:?AUTH_SIGNING_KEY is required}
    volumes:
      - ./data:/app/data
      - ./Files:/app/Files
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    command: >
      sh -c 'if [ "${APP_MODE:-prod}" = "dev" ]; then
        exec uvicorn server:app --host 0.0.0.0 --port 8000 --reload;
      else
        exec uvicorn server:app --host 0.0.0.0 --port 8000;
      fi'
