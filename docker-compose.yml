services:
  ryven:
    container_name: ryven
    image: ryven:latest
    build: .
    ports:
      - "8000:8000"
    # Only AUTH_SIGNING_KEY is required in environment variables.
    environment:
      APP_MODE: ${APP_MODE:-prod}
      AUTH_SIGNING_KEY: ${AUTH_SIGNING_KEY:?AUTH_SIGNING_KEY is required}
    volumes:
      - ./data:/app/data
      - ./data/projects:/data/projects
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    command: >
      sh -c 'if [ "${APP_MODE:-prod}" = "dev" ]; then
        exec uvicorn server:app --host 0.0.0.0 --port 8000 --reload;
      else
        exec uvicorn server:app --host 0.0.0.0 --port 8000;
      fi'
